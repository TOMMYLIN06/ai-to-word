<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tommy的AI轉Word工具</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#181824',
                        darkPanel: '#222232',
                        darkHeader: '#1e1e2e',
                        darkBorder: '#3a3a4c'
                    }
                }
            }
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .prose h1, .prose h2, .prose h3 { font-weight: bold; margin-bottom: 0.75rem; margin-top: 1.5rem; }
        .prose h1 { font-size: 1.5rem; } .prose h2 { font-size: 1.25rem; } .prose h3 { font-size: 1.125rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        
        .dark .prose { color: #d1d5db; }
        .dark .prose h1, .dark .prose h2, .dark .prose h3 { color: #f3f4f6; }
        
        html:not(.dark) .prose { color: #374151; }
        html:not(.dark) .prose h1, html:not(.dark) .prose h2, html:not(.dark) .prose h3 { color: #111827; }

        @media print {
            header, #inputPanel, #toolbar { display: none !important; }
            body, main, #previewPanel {
                background: white !important;
                display: block !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                overflow: visible !important;
            }
            #previewArea { overflow: visible !important; padding: 0 !important; }
            * { color: black !important; }
            .katex { color: black !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200 relative">

    <header class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-darkHeader transition-colors duration-200">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
            </div>
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-bold tracking-wide hidden sm:block">Tommy的AI轉Word工具</h1>
                <h1 class="text-xl font-bold tracking-wide sm:hidden">AI轉Word</h1>
                <span class="text-xs bg-blue-100 dark:bg-indigo-950 text-blue-600 dark:text-indigo-300 font-mono font-bold px-1.5 py-0.5 rounded">v2.1.0</span>
            </div>
        </div>
        
        <div class="flex items-center gap-3 shrink-0">
            <div id="userArea" class="hidden items-center gap-2">
                <span id="vipBadge" class="hidden bg-yellow-500 text-white text-xs font-bold px-2 py-1 rounded-md">👑 VIP</span>
                <span id="vipDate" class="hidden text-xs text-gray-500 dark:text-gray-400 font-medium tracking-wide"></span>
                <span id="userName" class="text-sm font-medium hidden md:block"></span>
                <button id="logoutBtn" class="text-xs px-2 py-1.5 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-md hover:bg-red-500 hover:text-white transition-colors">登出</button>
            </div>
            
            <button id="loginBtnUI" class="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                <span>登入 / 註冊</span>
            </button>

            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 dark:hover:text-white transition-colors">
                <div id="themeIcon"></div>
            </button>
        </div>
    </header>

    <main class="flex-1 p-4 lg:p-6 flex flex-col lg:grid lg:grid-cols-2 gap-4 lg:gap-6 h-auto lg:h-[calc(100vh-73px)]">
        <div id="inputPanel" class="flex flex-col rounded-xl border bg-white border-gray-200 dark:bg-darkPanel dark:border-darkBorder overflow-hidden shadow-sm transition-colors duration-200 min-h-[40vh] lg:min-h-0">
            <div class="flex items-center justify-between px-4 py-3 border-b bg-gray-50/50 border-gray-100 dark:bg-[#2a2a3d] dark:border-darkBorder">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    <h2 class="font-semibold text-sm">AI 原始文字貼上區</h2>
                </div>
                <button id="clearBtn" class="flex items-center gap-1 bg-red-500 hover:bg-red-600 text-white px-2.5 py-1 rounded-md text-xs font-medium transition-colors shadow-sm">清除</button>
            </div>
            <textarea id="inputText" class="flex-1 w-full p-4 resize-none outline-none font-mono text-sm leading-relaxed bg-transparent text-gray-700 placeholder-gray-400 dark:text-gray-300 dark:placeholder-gray-600" placeholder="請將 ChatGPT, Gemini 的文字貼到這裡..."></textarea>
        </div>

        <div id="previewPanel" class="flex flex-col rounded-xl border bg-white border-gray-200 dark:bg-darkPanel dark:border-darkBorder overflow-hidden shadow-sm transition-colors duration-200 min-h-[50vh] lg:min-h-0">
            <div id="toolbar" class="flex flex-col sm:flex-row items-start sm:items-center justify-between px-4 py-2.5 border-b bg-gray-50/50 border-gray-100 dark:bg-[#2a2a3d] dark:border-darkBorder gap-3 sm:gap-0">
                <div class="flex items-center gap-2 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <h2 class="font-semibold text-sm whitespace-nowrap">檔案即時預覽</h2>
                </div>
                
                <div class="flex items-center gap-2 w-full sm:w-auto overflow-x-auto">
                    <div class="flex items-center border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-darkBg overflow-hidden focus-within:ring-1 focus-within:ring-indigo-500 shrink-0">
                        <span class="px-2 py-1.5 text-xs text-gray-500 dark:text-gray-400 whitespace-nowrap border-r border-gray-200 dark:border-gray-700">檔名</span>
                        <input type="text" id="filenameInput" value="" class="w-40 sm:w-32 lg:w-40 px-2 py-1.5 text-sm bg-transparent text-gray-800 dark:text-gray-200 outline-none" placeholder="預設: Tommy的AI轉Word">
                    </div>
                    <button id="exportPdfBtn" class="flex items-center gap-1 bg-rose-600 hover:bg-rose-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors shadow-sm shrink-0">PDF</button>
                    <button id="exportBtn" class="flex items-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors shadow-sm shrink-0">Word</button>
                </div>
            </div>
            <div class="flex-1 p-6 overflow-auto">
                <div id="previewArea" class="prose max-w-none"></div>
            </div>
        </div>
    </main>

    <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 transition-opacity backdrop-blur-sm">
        <div class="bg-white dark:bg-darkPanel p-8 rounded-2xl shadow-2xl w-[90%] max-w-sm relative border border-gray-200 dark:border-gray-700">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <div class="text-center mb-6">
                <h3 class="text-2xl font-bold text-gray-900 dark:text-white" id="modalTitle">會員登入</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2" id="modalDesc">登入或輸入密鑰解鎖無限制匯出</p>
            </div>
            
            <div id="authSection" class="flex flex-col gap-3">
                <input type="email" id="emailInput" placeholder="電子信箱" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="password" id="passwordInput" placeholder="密碼 (至少6碼)" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
                
                <div class="flex justify-end">
                    <button id="forgotPasswordBtn" class="text-xs text-indigo-500 hover:text-indigo-600 underline">忘記密碼？</button>
                </div>

                <div class="flex gap-2 mt-2">
                    <button id="emailLoginBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-medium transition-colors">登入</button>
                    <button id="emailRegisterBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-885 dark:text-white py-2 rounded-lg font-medium transition-colors">註冊</button>
                </div>

                <div class="relative flex py-3 items-center">
                    <div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">或</span>
                    <div class="flex-grow border-t border-gray-300 dark:border-gray-600"></div>
                </div>

                <button id="googleLoginBtn" class="w-full flex items-center justify-center gap-3 bg-white dark:bg-darkBg border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 px-4 py-2.5 rounded-lg font-medium transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571c.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                    使用 Google 帳號一鍵登入
                </button>
            </div>

            <div id="vipSection" class="hidden">
                <p class="text-sm text-gray-600 dark:text-gray-300 mb-2">已登入，請輸入您的 VIP 密鑰：</p>
                <input type="text" id="keyInput" placeholder="例如：MONTH123" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500 mb-3">
                <button id="redeemBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-medium transition-colors shadow-sm">兌換 VIP 權限</button>
                <div class="mt-4 text-center">
                    <a href="mailto:你的信箱@gmail.com" class="text-xs text-indigo-500 hover:text-indigo-600 underline">沒有密鑰？點此聯絡取得方案</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔑 1. Firebase 設定區塊 
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDJgROetgdjW3dO5g0nrIF958ZW_vXxSow",
            authDomain: "ai-to-word.firebaseapp.com",
            projectId: "ai-to-word",
            storageBucket: "ai-to-word.firebasestorage.app",
            messagingSenderId: "423279715448",
            appId: "1:423279715448:web:a1a926b1f62615919ab98d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let currentUser = null;
        let isUserVip = false;

        document.addEventListener('DOMContentLoaded', () => {
            const inputText = document.getElementById('inputText');
            const previewArea = document.getElementById('previewArea');
            const exportBtn = document.getElementById('exportBtn');
            const exportPdfBtn = document.getElementById('exportPdfBtn');
            const clearBtn = document.getElementById('clearBtn');
            const filenameInput = document.getElementById('filenameInput');
            const themeToggle = document.getElementById('themeToggle');
            const htmlElement = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            
            const loginModal = document.getElementById('loginModal');
            const userArea = document.getElementById('userArea');
            const loginBtnUI = document.getElementById('loginBtnUI');
            const userName = document.getElementById('userName');
            const vipBadge = document.getElementById('vipBadge');
            const vipDate = document.getElementById('vipDate');

            const authSection = document.getElementById('authSection');
            const vipSection = document.getElementById('vipSection');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');

            // 深淺色切換
            const sunIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
            const moonIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

            function updateThemeIcon() {
                themeIcon.innerHTML = htmlElement.classList.contains('dark') ? sunIcon : moonIcon;
            }
            updateThemeIcon();
            themeToggle.addEventListener('click', () => {
                htmlElement.classList.toggle('dark');
                updateThemeIcon();
            });

            // ==========================================
            // 👤 2. 會員狀態監聽
            // ==========================================
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    userArea.classList.remove('hidden');
                    userArea.classList.add('flex');
                    loginBtnUI.classList.remove('flex');
                    loginBtnUI.classList.add('hidden');
                    userName.textContent = user.displayName || user.email.split('@')[0];

                    await checkVipStatus(user.uid);
                    
                    if (!isUserVip) {
                        authSection.classList.add('hidden');
                        vipSection.classList.remove('hidden');
                        modalTitle.textContent = "升級 VIP 會員";
                        modalDesc.textContent = "請輸入兌換碼解鎖無限匯出功能";
                    } else {
                        loginModal.classList.add('hidden');
                        loginModal.classList.remove('flex');
                    }
                } else {
                    currentUser = null;
                    isUserVip = false;
                    vipBadge.classList.add('hidden');
                    vipDate.classList.add('hidden');
                    userArea.classList.add('hidden');
                    userArea.classList.remove('flex');
                    loginBtnUI.classList.remove('hidden');
                    loginBtnUI.classList.add('flex');
                    
                    authSection.classList.remove('hidden');
                    vipSection.classList.add('hidden');
                    modalTitle.textContent = "會員登入";
                    modalDesc.textContent = "登入或輸入密鑰解鎖無限制匯出";
                }
            });

            async function checkVipStatus(uid) {
                try {
                    const doc = await db.collection('vipUsers').doc(uid).get();
                    if (doc.exists) {
                        const data = doc.data();
                        const now = new Date();
                        if (data.isLifetime || (data.expireAt && data.expireAt.toDate() > now)) {
                            isUserVip = true;
                            vipBadge.classList.remove('hidden');
                            
                            // 顯示到期日
                            vipDate.classList.remove('hidden');
                            if (data.isLifetime) {
                                vipDate.textContent = '永久有效';
                            } else {
                                const expDate = data.expireAt.toDate();
                                vipDate.textContent = `${expDate.getFullYear()}/${expDate.getMonth()+1}/${expDate.getDate()} 到期`;
                            }
                            return;
                        }
                    }
                    isUserVip = false;
                    vipBadge.classList.add('hidden');
                    vipDate.classList.add('hidden');
                } catch(e) {
                    console.error("讀取 VIP 狀態失敗", e);
                }
            }

            loginBtnUI.addEventListener('click', () => {
                loginModal.classList.remove('hidden');
                loginModal.classList.add('flex');
            });
            document.getElementById('closeModalBtn').addEventListener('click', () => {
                loginModal.classList.add('hidden');
                loginModal.classList.remove('flex');
            });

            // Email 登入
            document.getElementById('emailLoginBtn').addEventListener('click', () => {
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                if(!email || !password) return alert("請輸入信箱與密碼");
                auth.signInWithEmailAndPassword(email, password).catch(err => alert("登入失敗：" + err.message));
            });

            // Email 註冊
            document.getElementById('emailRegisterBtn').addEventListener('click', () => {
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                if(!email || !password) return alert("請輸入信箱與密碼");
                auth.createUserWithEmailAndPassword(email, password).catch(err => alert("註冊失敗：" + err.message));
            });

            // 忘記密碼發信
            document.getElementById('forgotPasswordBtn').addEventListener('click', () => {
                const email = document.getElementById('emailInput').value.trim();
                if(!email) return alert("請先在上方輸入您的電子信箱，再點擊忘記密碼。");
                auth.sendPasswordResetEmail(email)
                    .then(() => alert("✅ 密碼重設信件已寄出！請前往您的信箱收信。"))
                    .catch(error => alert("❌ 發生錯誤：" + error.message));
            });

            // Google 一鍵登入
            document.getElementById('googleLoginBtn').addEventListener('click', () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(error => alert("登入發生錯誤：" + error.message));
            });

            // 登出
            document.getElementById('logoutBtn').addEventListener('click', () => {
                auth.signOut();
            });

            // ==========================================
            // 🎫 3. 執行密鑰兌換 (雙向資料紀錄)
            // ==========================================
            document.getElementById('redeemBtn').addEventListener('click', async () => {
                const key = document.getElementById('keyInput').value.trim().toUpperCase();
                if (!key) return alert("⚠️ 請輸入密鑰！");
                if (!currentUser) return alert("⚠️ 請先登入或註冊！");

                const keyRef = db.collection('vipKeys').doc(key);
                try {
                    const keyDoc = await keyRef.get();
                    if (keyDoc.exists && keyDoc.data().isUsed !== true) {
                        const durationType = keyDoc.data().duration;
                        let newExpireAt = null;
                        let isLife = false;

                        if (durationType === 'forever' || durationType === 'lifetime') {
                            isLife = true;
                        } else {
                            const addDays = parseInt(durationType) || 30;
                            newExpireAt = new Date(Date.now() + (addDays * 24 * 60 * 60 * 1000));
                        }

                        await db.collection('vipUsers').doc(currentUser.uid).set({
                            isLifetime: isLife,
                            expireAt: isLife ? null : newExpireAt,
                            redeemedKey: key,
                            userEmail: currentUser.email
                        });

                        await keyRef.update({ 
                            isUsed: true,
                            usedByEmail: currentUser.email,
                            usedByUid: currentUser.uid,
                            usedAt: new Date()
                        });
                        
                        alert("🎉 兌換成功！已為您開通 VIP 權限。");
                        location.reload(); 
                    } else {
                        alert("❌ 無效或已被使用的密鑰！");
                    }
                } catch(e) {
                    console.error(e);
                    alert("❌ 系統錯誤，請確認網路連線或檢查資料庫權限設定！");
                }
            });

            // ==========================================
            // 📄 4. 預覽與匯出邏輯
            // ==========================================
            function updatePreview() {
                let text = inputText.value;
                if (!window.marked || !window.renderMathInElement) return;
                const mathBlocks = {};
                let mathIndex = 0;
                const replaceWithPlaceholder = (match) => {
                    const placeholder = `@@@MATH${mathIndex}@@@`;
                    let safeMath = match;
                    safeMath = safeMath.replace(/(^|[^a-zA-Z0-9\)\}\]\\])_/g, '$1{}_');
                    safeMath = safeMath.replace(/(^|[^\\])%/g, '$1\\%');
                    mathBlocks[placeholder] = safeMath;
                    mathIndex++;
                    return placeholder;
                };

                text = text.replace(/\$$([\s\S]+?)\$$\$/g, replaceWithPlaceholder);
                text = text.replace(/\\\[([\s\S]+?)\\\]/g, replaceWithPlaceholder);
                text = text.replace(/\\\(([\s\S]+?)\\\)/g, replaceWithPlaceholder);
                text = text.replace(/\$([^$\n]+?)\$/g, replaceWithPlaceholder);

                let rawHtml = marked.parse(text);
                for (const [placeholder, mathText] of Object.entries(mathBlocks)) {
                    rawHtml = rawHtml.replace(placeholder, () => mathText);
                }
                previewArea.innerHTML = rawHtml;

                renderMathInElement(previewArea, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false,
                    output: 'htmlAndMathml'
                });
            }

            inputText.addEventListener('input', updatePreview);
            setTimeout(updatePreview, 500);
            clearBtn.addEventListener('click', () => {
                inputText.value = '';
                updatePreview();
            });

            function checkExportPermission() {
                if (!currentUser) {
                    loginModal.classList.remove('hidden');
                    loginModal.classList.add('flex');
                    return false;
                }
                if (!isUserVip) {
                    alert("您目前的帳號沒有 VIP 權限喔！\n\n如果您已經購買密鑰，請在畫面中輸入以兌換。");
                    loginModal.classList.remove('hidden');
                    loginModal.classList.add('flex');
                    return false;
                }
                if (inputText.value.trim() === '') {
                    alert('請先輸入內容喔！'); 
                    return false;
                }
                return true;
            }

            exportPdfBtn.addEventListener('click', () => {
                if(!checkExportPermission()) return;
                const filename = filenameInput.value.trim() || 'Tommy的AI轉Word';
                const originalTitle = document.title;
                document.title = filename;
                setTimeout(() => {
                    try { window.print(); } catch (e) { alert("瀏覽器不支援列印功能。"); }
                    setTimeout(() => { document.title = originalTitle; }, 2000);
                }, 300);
            });

            exportBtn.addEventListener('click', () => {
                if(!checkExportPermission()) return;
                const filename = filenameInput.value.trim() || 'Tommy的AI轉Word';
                const clone = previewArea.cloneNode(true);
                clone.querySelectorAll('.katex-html').forEach(node => node.remove());
                const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns:m='http://schemas.w3.org/1998/Math/MathML' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>${filename}</title>
                <style>body { font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; font-size: 12pt; line-height: 1.5; } h1, h2, h3 { color: #333; font-weight: bold; } p { margin-bottom: 1em; } ul, ol { margin-left: 20px; }</style>
                </head><body>${clone.innerHTML}</body></html>`;

                const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${filename}.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            });
        });
    </script>
</body>
</html>
