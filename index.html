<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#181824',
                        darkPanel: '#222232',
                        darkHeader: '#1e1e2e',
                        darkBorder: '#3a3a4c',
                        vdrBg: '#525659',
                        vdrDarkBg: '#121212',
                        vdrPageDark: '#1e1e1e'
                    }
                }
            }
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .prose h1, .prose h2, .prose h3 { font-weight: bold; margin-bottom: 0.75rem; margin-top: 1.5rem; }
        .prose h1 { font-size: 1.5rem; } .prose h2 { font-size: 1.25rem; } .prose h3 { font-size: 1.125rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        
        .dark .prose { color: #d1d5db; }
        .dark .prose h1, .dark .prose h2, .dark .prose h3 { color: #f3f4f6; }
        html:not(.dark) .prose { color: #374151; }
        html:not(.dark) .prose h1, html:not(.dark) .prose h2, html:not(.dark) .prose h3 { color: #111827; }

        /* VDR 紙張效果 */
        .vdr-page-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); }
        
        /* 動態浮水印樣式 */
        .watermark-item {
            font-size: 1.125rem;
            font-weight: 800;
            color: rgba(150, 150, 150, 0.25);
            transform: rotate(-30deg);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            margin: 3rem;
        }
        .dark .watermark-item { color: rgba(200, 200, 200, 0.15); }

        @media print {
            header, #inputPanel, #vdrToolbar, #vdrSidebar { display: none !important; }
            body, main, #vdrPanel, #vdrReaderArea, #vdrPage {
                background: white !important; display: block !important; height: auto !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; overflow: visible !important; min-height: 0 !important;
            }
            #watermarkLayer { display: none !important; }
            * { color: black !important; }
            .katex { color: black !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200 relative">

    <!-- === 頂部導覽列 === -->

            </div>

            </div>
        </div>

                <div class="flex flex-col">
                    <span id="userName" class="text-sm font-semibold leading-tight text-gray-800 dark:text-gray-200"></span>
                    <span id="vipBadgeHeader" class="text-[10px] text-yellow-600 dark:text-yellow-400 font-bold hidden leading-tight">👑 VIP會員</span>
                </div>
            </div>
            
            <button id="loginBtnUI" class="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>

        </div>

                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>

                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571c.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>

        // 🛡️ 1. 企業級安全防護模組 (Security Manager)
        class SecurityManager {
            constructor() {
                this.isVip = false;
                this.userEmail = '未登入訪客';
                this.vdrPage = document.getElementById('vdrPage');
                this.previewArea = document.getElementById('previewArea');
                this.watermarkLayer = document.getElementById('watermarkLayer');
                this.antiCopyBadge = document.getElementById('antiCopyBadge');
                
                this.watermarkInterval = null;
                this.mutationObserver = null;
                
                this.initBlockers();
            }

            // 攔截開發者工具與右鍵
            initBlockers() {
                // 阻擋 F12, Ctrl+Shift+I, Ctrl+U
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'F12' || 
                       (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                       (e.ctrlKey && e.key === 'U')) {
                        e.preventDefault();
                    }
                });

                // VDR 防拷貝：右鍵攔截
                this.vdrPage.addEventListener('contextmenu', (e) => {
                    if (!this.isVip) {
                        e.preventDefault();
                        alert("⚠️ VDR 防護系統已啟動：禁止右鍵！\n\n請登入 VIP 帳號以自動解除防拷貝鎖定。");
                    }
                });

                // VDR 防拷貝：複製與剪貼簿清洗
                this.vdrPage.addEventListener('copy', (e) => {
                    if (!this.isVip) {
                        e.preventDefault();
                        if (e.clipboardData) {
                            e.clipboardData.setData('text/plain', '【VDR 安全防護警告】此文件受版權保護，禁止未授權複製。請升級 VIP 以解除限制。');
                        }
                        alert("⚠️ VDR 防護系統已啟動：禁止複製！\n\n系統已強制清洗您的剪貼簿。請登入 VIP 帳號以解除限制。");
                    }
                });

                // VDR 防拷貝：防拖曳
                this.vdrPage.addEventListener('dragstart', (e) => {
                    if (!this.isVip) e.preventDefault();
                });
            }

            // 更新身分權限
            updateStatus(isVip, email) {
                this.isVip = isVip;
                this.userEmail = email || '未登入訪客';
                if (isVip) {
                    this.disableProtection();
                } else {
                    this.enableProtection();
                }
            }

            // 啟動防護 (免費用戶)
            enableProtection() {
                this.previewArea.classList.add('select-none');
                this.antiCopyBadge.classList.remove('hidden');
                this.startDynamicWatermark();
                this.startAttributeObserver();
            }

            // 解除防護 (VIP用戶)
            disableProtection() {
                this.previewArea.classList.remove('select-none');
                this.antiCopyBadge.classList.add('hidden');
                this.stopDynamicWatermark();
                this.stopAttributeObserver();
            }

            // 動態實名時間戳浮水印
            startDynamicWatermark() {
                this.stopDynamicWatermark();
                this.watermarkLayer.style.display = 'flex';
                this.watermarkLayer.style.opacity = '1';
                
                const renderWatermark = () => {
                    const now = new Date();
                    const timeString = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                    const text = `${this.userEmail} | ${timeString}`;
                    
                    this.watermarkLayer.innerHTML = '';
                    for(let i = 0; i < 40; i++) {
                        const div = document.createElement('div');
                        div.className = 'watermark-item';
                        div.innerText = text;
                        this.watermarkLayer.appendChild(div);
                    }
                };
                renderWatermark();
                this.watermarkInterval = setInterval(renderWatermark, 1000); // 每秒更新時間戳
            }

            stopDynamicWatermark() {
                if (this.watermarkInterval) clearInterval(this.watermarkInterval);
                this.watermarkLayer.style.display = 'none';
                this.watermarkLayer.innerHTML = '';
            }

            // 屬性竄改偵測 (防駭客刪除浮水印)
            startAttributeObserver() {
                this.stopAttributeObserver();
                this.mutationObserver = new MutationObserver((mutations) => {
                    let isTampered = false;
                    mutations.forEach(m => {
                        // 檢查屬性是否被隱藏
                        if (m.target === this.watermarkLayer) {
                            const style = window.getComputedStyle(this.watermarkLayer);
                            if (style.display === 'none' || style.opacity === '0' || style.visibility === 'hidden') {
                                isTampered = true;
                            }
                        }
                        // 檢查節點是否被刪除
                        if (m.removedNodes.length > 0) {
                            m.removedNodes.forEach(node => {
                                if (node === this.watermarkLayer) isTampered = true;
                            });
                        }
                    });

                    if (isTampered) {
                        console.warn("⚠️ 偵測到浮水印異常竄改，強制還原防護設定！");
                        if (!this.vdrPage.contains(this.watermarkLayer)) {
                            this.vdrPage.appendChild(this.watermarkLayer);
                        }
                        this.watermarkLayer.setAttribute('style', 'position: absolute; inset: 0px; z-index: 50; pointer-events: none; overflow: hidden; display: flex; flex-wrap: wrap; justify-content: center; opacity: 1;');
                    }
                });

                this.mutationObserver.observe(this.vdrPage, { 
                    attributes: true, 
                    childList: true, 
                    subtree: true, 
                    attributeFilter: ['style', 'class'] 
                });
            }

            stopAttributeObserver() {
                if (this.mutationObserver) {
                    this.mutationObserver.disconnect();
                    this.mutationObserver = null;
                }
            }
        }

        // 📝 2. AI 編輯器與解析模組 (Editor Manager)
        class EditorManager {
            constructor() {
                this.inputText = document.getElementById('inputText');
                this.previewArea = document.getElementById('previewArea');
                this.autoFixToggle = document.getElementById('autoFixToggle');
                this.mathFixedNotice = document.getElementById('mathFixedNotice');
                this.clearBtn = document.getElementById('clearBtn');
                
                this.bindEvents();
            }

            bindEvents() {
                this.inputText.addEventListener('input', () => this.updatePreview());
                this.autoFixToggle.addEventListener('change', () => this.updatePreview());
                this.clearBtn.addEventListener('click', () => {
                    this.inputText.value = '';
                    this.updatePreview();
                });
                setTimeout(() => this.updatePreview(), 500);
            }

            autoFixGeminiMath(text) {
                if (!text) return { fixedText: text, modified: false };
                let protectedText = text;
                const protections = [];
                
                const protect = (regex, validator) => {
                    protectedText = protectedText.replace(regex, (m, p1) => {
                        if (validator && !validator(p1)) return m;
                        protections.push(m);
                        return `###PROT_${protections.length - 1}###`;
                    });
                };
                protect(/```[\s\S]*?```/g);
                protect(/`[^`\n]+`/g);
                protect(/\$\$([\s\S]+?)\$\$/g);
                protect(/\\\[([\s\S]+?)\\\]/g);
                protect(/\\\(([\s\S]+?)\\\)/g);
                protect(/\$([^$\n]+?)\$/g, (p1) => (p1.match(/[\u4e00-\u9FFF]/g) || []).length <= 2);

                let modified = false;
                const parts = protectedText.split(/([\u4e00-\u9FFF\u3000-\u303F\uFF00-\uFFEF\n\r]+)/);
                
                for(let i = 0; i < parts.length; i += 2) {
                    let segment = parts[i];
                    if (!segment.trim() || segment.includes('###PROT_') || segment.includes('http')) continue;
                    
                    const trimmed = segment.trim();
                    const matchObj = trimmed.match(/^([\*\s]*)(.*?)([\*:\s,\.\?。，；？！]*)$/);
                    if (!matchObj) continue;
                    
                    const prefix = matchObj[1];
                    let mathPart = matchObj[2];
                    const suffix = matchObj[3];

                    if (!mathPart) continue;

                    const hasMath = /\\[a-zA-Z]+/.test(mathPart) || /_{/.test(mathPart) || /\^{/.test(mathPart) || /[a-zA-Z]_[0-9a-zA-Z]/.test(mathPart) || /[a-zA-Z]\^[0-9a-zA-Z]/.test(mathPart);
                    const isJustMarkdown = /^[\*\-_~\s]+$/.test(mathPart) || /^[a-zA-Z0-9\.\s,]+$/.test(mathPart);

                    if (hasMath && !isJustMarkdown) {
                        modified = true;
                        mathPart = mathPart.replace(/\$/g, '');
                        parts[i] = segment.replace(trimmed, `${prefix}$${mathPart}$${suffix}`);
                    }
                }
                
                protectedText = parts.join('');
                protections.forEach((prot, i) => { protectedText = protectedText.replace(`###PROT_${i}###`, prot); });
                return { fixedText: protectedText, modified };
            }

            updatePreview() {
                let text = this.inputText.value;
                if (!window.marked || !window.renderMathInElement || text.trim() === '') {
                    this.mathFixedNotice.classList.add('hidden');
                    this.previewArea.innerHTML = '';
                    return;
                }

                if (this.autoFixToggle.checked) {
                    const result = this.autoFixGeminiMath(text);
                    text = result.fixedText;
                    if (result.modified) {
                        this.mathFixedNotice.classList.remove('hidden');
                        this.mathFixedNotice.classList.add('block');
                    } else {
                        this.mathFixedNotice.classList.add('hidden');
                        this.mathFixedNotice.classList.remove('block');
                    }
                } else {
                    this.mathFixedNotice.classList.add('hidden');
                    this.mathFixedNotice.classList.remove('block');
                }

                // 星號排版修正引擎
                text = text.replace(/\*\*([^\*]+?)\*\*/g, (match, content) => '**' + content.trim() + '**');

                const mathBlocks = {};
                let mathIndex = 0;
                const replaceWithPlaceholder = (match) => {
                    if (match.startsWith('$') && !match.startsWith('$$') && !match.startsWith('\\[')) {
                        if ((match.match(/[\u4e00-\u9FFF]/g) || []).length > 2) return match; 
                    }
                    const placeholder = `@@@MATH${mathIndex}@@@`;
                    let safeMath = match.replace(/(^|[^a-zA-Z0-9\)\}\]\\])_/g, '$1{}_').replace(/(^|[^\\])%/g, '$1\\%');
                    mathBlocks[placeholder] = safeMath;
                    mathIndex++;
                    return placeholder;
                };

                text = text.replace(/\$\$([\s\S]+?)\$\$/g, replaceWithPlaceholder);
                text = text.replace(/\\\[([\s\S]+?)\\\]/g, replaceWithPlaceholder);
                text = text.replace(/\\\(([\s\S]+?)\\\)/g, replaceWithPlaceholder);
                text = text.replace(/\$([^$\n]+?)\$/g, replaceWithPlaceholder);

                let rawHtml = marked.parse(text);
                for (const [placeholder, mathText] of Object.entries(mathBlocks)) {
                    rawHtml = rawHtml.replace(placeholder, () => mathText);
                }
                this.previewArea.innerHTML = rawHtml;

                renderMathInElement(this.previewArea, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false,
                    errorColor: '#f43f5e',
                    strict: false,
                    trust: true,
                    output: 'htmlAndMathml'
                });
            }
        }

        // 🌐 3. 主應用核心架構 (App Core)
        class App {
            constructor() {
                this.db = firebase.firestore();
                this.auth = firebase.auth();
                this.currentUser = null;
                this.isUserVip = false;

                this.security = new SecurityManager();
                this.editor = new EditorManager();
                
                this.initUI();
                this.initAuth();
                this.initExports();
            }

            initUI() {
                // 主題切換
                const themeToggle = document.getElementById('themeToggle');
                const themeIcon = document.getElementById('themeIcon');
                const htmlElement = document.documentElement;
                const sunIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
                const moonIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
                
                const updateThemeIcon = () => { themeIcon.innerHTML = htmlElement.classList.contains('dark') ? sunIcon : moonIcon; };
                updateThemeIcon();
                themeToggle.addEventListener('click', () => { htmlElement.classList.toggle('dark'); updateThemeIcon(); });

                // 彈出視窗控制
                document.getElementById('loginBtnUI').addEventListener('click', () => { document.getElementById('loginModal').classList.replace('hidden','flex'); });
                document.getElementById('closeLoginModalBtn').addEventListener('click', () => { document.getElementById('loginModal').classList.replace('flex','hidden'); });
                document.getElementById('userArea').addEventListener('click', () => { document.getElementById('accountModal').classList.replace('hidden','flex'); });
                document.getElementById('closeAccountModalBtn').addEventListener('click', () => { 
                    document.getElementById('accountModal').classList.replace('flex','hidden'); 
                    document.getElementById('accountKeyInput').value = ''; 
                });
            }

            initAuth() {
                try { this.auth.getRedirectResult().catch(e => {}); } catch(e) {}

                this.auth.onAuthStateChanged(async (user) => {
                    this.currentUser = user;
                    const userArea = document.getElementById('userArea');
                    const loginBtnUI = document.getElementById('loginBtnUI');
                    
                    if (user) {
                        userArea.classList.replace('hidden', 'flex');
                        loginBtnUI.classList.replace('flex', 'hidden');
                        
                        document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
                        document.getElementById('userAvatar').src = user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}&backgroundColor=b6e3f4`;
                        document.getElementById('loginModal').classList.replace('flex', 'hidden');
                        document.getElementById('accountEmailDisplay').textContent = user.email;

                        await this.checkVipStatus(user.uid);
                    } else {
                        this.isUserVip = false;
                        this.security.updateStatus(false);
                        
                        userArea.classList.replace('flex', 'hidden');
                        loginBtnUI.classList.replace('hidden', 'flex');
                        document.getElementById('vipBadgeHeader').classList.add('hidden');
                        document.getElementById('accountModal').classList.replace('flex', 'hidden');
                    }
                });

                // 綁定登入行為
                document.getElementById('emailLoginBtn').addEventListener('click', () => {
                    const e = document.getElementById('emailInput').value.trim(), p = document.getElementById('passwordInput').value;
                    if(!e || !p) return alert("請輸入信箱與密碼");
                    this.auth.signInWithEmailAndPassword(e, p).catch(err => alert("登入失敗：" + err.message));
                });
                document.getElementById('emailRegisterBtn').addEventListener('click', () => {
                    const e = document.getElementById('emailInput').value.trim(), p = document.getElementById('passwordInput').value;
                    if(!e || !p) return alert("請輸入信箱與密碼");
                    this.auth.createUserWithEmailAndPassword(e, p).catch(err => alert("註冊失敗：" + err.message));
                });
                document.getElementById('googleLoginBtn').addEventListener('click', () => {
                    if (/(FBAN|FBAV|Line|Instagram|MicroMessenger)/i.test(navigator.userAgent)) {
                        return alert("⚠️ 內建瀏覽器無法使用 Google 登入！\n\n請直接在畫面上方輸入 Email 與密碼，按下【註冊】即可無痛登入！");
                    }
                    const loader = document.getElementById('googleBtnLoader');
                    loader.classList.replace('hidden', 'flex');
                    this.auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).finally(() => loader.classList.replace('flex', 'hidden'))
                        .catch(err => { if(err.code === 'auth/popup-blocked') alert("⚠️ 瀏覽器阻擋視窗，請改用 Email 註冊！"); });
                });
                document.getElementById('accountLogoutBtn').addEventListener('click', () => this.auth.signOut());
                
                // 綁定序號兌換
                document.getElementById('accountRedeemBtn').addEventListener('click', () => this.redeemKey());
            }

            async checkVipStatus(uid) {
                try {
                    const doc = await this.db.collection('vipUsers').doc(uid).get();
                    this.isUserVip = false;
                    let displayPlan = "基礎免費方案", displayExp = "未開通匯出權限，預覽區防拷貝鎖定中";
                    
                    if (doc.exists) {
                        const data = doc.data();
                        const now = new Date();
                        if (data.isLifetime) {
                            this.isUserVip = true;
                            displayPlan = "👑 VIP 會員"; displayExp = "✓ 永久有效，享有完整匯出與複製權限";
                        } else if (data.expireAt && data.expireAt.toDate() > now) {
                            this.isUserVip = true;
                            const expDate = data.expireAt.toDate();
                            const diffDays = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
                            displayPlan = "👑 VIP 會員"; 
                            displayExp = `將於 ${expDate.getFullYear()}/${String(expDate.getMonth()+1).padStart(2,'0')}/${String(expDate.getDate()).padStart(2,'0')} 到期 (剩餘 ${diffDays} 天)`;
                        }
                    }

                    document.getElementById('accountPlanDisplay').textContent = displayPlan;
                    document.getElementById('accountExpiryDisplay').textContent = displayExp;
                    if(this.isUserVip) document.getElementById('vipBadgeHeader').classList.remove('hidden');
                    else document.getElementById('vipBadgeHeader').classList.add('hidden');

                    this.security.updateStatus(this.isUserVip, this.currentUser.email);
                } catch(e) { console.error("讀取 VIP 失敗", e); }
            }

            async redeemKey() {
                const key = document.getElementById('accountKeyInput').value.trim();
                if (!key) return alert("⚠️ 請輸入兌換序號！");
                if (!this.currentUser) return alert("⚠️ 發生錯誤，請重新登入！");

                try {
                    const keyRef = this.db.collection('vipKeys').doc(key);
                    const keyDoc = await keyRef.get();
                    if (!keyDoc.exists) return alert("❌ 兌換失敗：無效的序號！");

                    const keyData = keyDoc.data();
                    if (!keyData.isUniversal && keyData.isUsed) return alert("❌ 兌換失敗：該序號已被使用！");

                    const userRef = this.db.collection('vipUsers').doc(this.currentUser.uid);
                    const userDoc = await userRef.get();
                    const userData = userDoc.exists ? userDoc.data() : {};

                    if (userData.isLifetime) return alert("⚠️ 您已經是永久 VIP，不需再兌換！");
                    if (keyData.isUniversal && (userData.usedTrialKeys || []).includes(key)) return alert("⚠️ 每個帳號限領一次此試用序號！");

                    let newExpireAt = null;
                    let isLife = false;
                    const now = new Date();

                    if (keyData.duration === 'forever' || keyData.duration === 'lifetime') {
                        isLife = true;
                    } else {
                        const addMs = (parseInt(keyData.duration) || 30) * 24 * 60 * 60 * 1000;
                        newExpireAt = new Date((userData.expireAt && userData.expireAt.toDate() > now) ? userData.expireAt.toDate().getTime() + addMs : now.getTime() + addMs);
                    }

                    const updateData = { isLifetime: isLife, expireAt: isLife ? null : newExpireAt, redeemedKey: key, userEmail: this.currentUser.email };
                    if (keyData.isUniversal) {
                        updateData.usedTrialKeys = firebase.firestore.FieldValue.arrayUnion(key);
                    } else {
                        await keyRef.update({ isUsed: true, usedByEmail: this.currentUser.email, usedByUid: this.currentUser.uid, usedAt: now });
                    }

                    await userRef.set(updateData, { merge: true });
                    alert("🎉 兌換成功！防拷貝鎖定已解除。");
                    document.getElementById('accountKeyInput').value = '';
                    await this.checkVipStatus(this.currentUser.uid);
                } catch(e) { console.error(e); alert("❌ 系統錯誤！"); }
            }

            initExports() {
                const checkPerm = () => {
                    if (!this.currentUser) { document.getElementById('loginModal').classList.replace('hidden','flex'); return false; }
                    if (!this.isUserVip) { document.getElementById('accountModal').classList.replace('hidden','flex'); return false; }
                    if (document.getElementById('inputText').value.trim() === '') { alert('請輸入內容'); return false; }
                    return true;
                };

                document.getElementById('exportPdfBtn').addEventListener('click', () => {
                    if(!checkPerm()) return;
                    const originalTitle = document.title;
                    document.title = document.getElementById('filenameInput').value.trim() || 'Tommy的AI轉Word';
                    setTimeout(() => { window.print(); setTimeout(() => document.title = originalTitle, 2000); }, 300);
                });

                document.getElementById('exportBtn').addEventListener('click', () => {
                    if(!checkPerm()) return;
                    const filename = document.getElementById('filenameInput').value.trim() || 'Tommy的AI轉Word';
                    const clone = document.getElementById('previewArea').cloneNode(true);
                    clone.querySelectorAll('.katex-html').forEach(n => n.remove());
                    const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns:m='http://schemas.w3.org/1998/Math/MathML'><head><meta charset='utf-8'><title>${filename}</title><style>body{font-family:"Microsoft JhengHei",sans-serif;font-size:12pt;line-height:1.5;}h1,h2,h3{font-weight:bold;}p{margin-bottom:1em;}</style></head><body>${clone.innerHTML}</body></html>`;
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(new Blob(['\ufeff', html], {type: 'application/msword'}));
                    link.download = `${filename}.doc`;
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                });
            }
        }

        // 啟動應用程式
        document.addEventListener('DOMContentLoaded', () => { new App(); });
    </script>
