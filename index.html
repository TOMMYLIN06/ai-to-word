<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tommy的AI轉Word的工具</title>

    <!-- 載入 Tailwind CSS 來處理排版與樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#181824',
                        darkPanel: '#222232',
                        darkHeader: '#1e1e2e',
                        darkBorder: '#3a3a4c'
                    }
                }
            }
        }
    </script>

    <!-- 載入 KaTeX 處理數學公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- 載入 Marked 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- 自訂文章樣式 (相容深色/淺色) -->
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .prose h1, .prose h2, .prose h3 { font-weight: bold; margin-bottom: 0.75rem; margin-top: 1.5rem; }
        .prose h1 { font-size: 1.5rem; } .prose h2 { font-size: 1.25rem; } .prose h3 { font-size: 1.125rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        
        /* 深色模式文字 */
        .dark .prose { color: #d1d5db; }
        .dark .prose h1, .dark .prose h2, .dark .prose h3 { color: #f3f4f6; }
        
        /* 淺色模式文字 */
        html:not(.dark) .prose { color: #374151; }
        html:not(.dark) .prose h1, html:not(.dark) .prose h2, html:not(.dark) .prose h3 { color: #111827; }

        /* === 專屬列印排版 (為了匯出成完美的純文字 PDF) === */
        @media print {
            /* 隱藏不需列印的 UI 元素 (導覽列、輸入區、工具列) */
            header, #inputPanel, #toolbar {
                display: none !important;
            }
            
            /* 將畫面強制調整為白底、自動高度，避免被捲動條切斷 */
            body, main, #previewPanel {
                background: white !important;
                display: block !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                overflow: visible !important;
            }

            /* 確保預覽區塊可以跨頁列印，留白完全交給瀏覽器預設處理 */
            #previewArea {
                overflow: visible !important;
                padding: 0 !important; 
            }

            /* 強制將所有文字 (包含深色模式下的白字) 轉回黑色 */
            * { color: black !important; }
            .katex { color: black !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200">

    <header class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-darkHeader transition-colors duration-200">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-wide">Tommy的AI轉Word的工具</h1>
        </div>
        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 dark:hover:text-white transition-colors" title="切換深/淺色主題">
            <div id="themeIcon"></div>
        </button>
    </header>

    <main class="flex-1 p-4 lg:p-6 flex flex-col lg:grid lg:grid-cols-2 gap-4 lg:gap-6 h-auto lg:h-[calc(100vh-73px)]">
        
        <div id="inputPanel" class="flex flex-col rounded-xl border bg-white border-gray-200 dark:bg-darkPanel dark:border-darkBorder overflow-hidden shadow-sm transition-colors duration-200 min-h-[40vh] lg:min-h-0">
            <div class="flex items-center justify-between px-4 py-3 border-b bg-gray-50/50 border-gray-100 dark:bg-[#2a2a3d] dark:border-darkBorder transition-colors duration-200">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    <h2 class="font-semibold text-sm">AI 原始文字貼上區</h2>
                </div>
                <button id="clearBtn" class="flex items-center gap-1 bg-red-500 hover:bg-red-600 text-white px-2.5 py-1 rounded-md text-xs font-medium transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    清除
                </button>
            </div>
            <textarea id="inputText" class="flex-1 w-full p-4 resize-none outline-none font-mono text-sm leading-relaxed bg-transparent text-gray-700 placeholder-gray-400 dark:text-gray-300 dark:placeholder-gray-600" placeholder="請將 ChatGPT, Gemini 的文字貼到這裡..."></textarea>
        </div>

        <div id="previewPanel" class="flex flex-col rounded-xl border bg-white border-gray-200 dark:bg-darkPanel dark:border-darkBorder overflow-hidden shadow-sm transition-colors duration-200 min-h-[50vh] lg:min-h-0">
            <div id="toolbar" class="flex flex-col sm:flex-row items-start sm:items-center justify-between px-4 py-2.5 border-b bg-gray-50/50 border-gray-100 dark:bg-[#2a2a3d] dark:border-darkBorder transition-colors duration-200 gap-3 sm:gap-0">
                <div class="flex items-center gap-2 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <h2 class="font-semibold text-sm whitespace-nowrap">檔案即時預覽</h2>
                </div>
                
                <div class="flex items-center gap-2 w-full sm:w-auto overflow-x-auto">
                    <div class="flex items-center border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-darkBg overflow-hidden focus-within:ring-1 focus-within:ring-indigo-500 shrink-0">
                        <span class="px-2 py-1.5 text-xs text-gray-500 dark:text-gray-400 whitespace-nowrap border-r border-gray-200 dark:border-gray-700">檔名</span>
                        <input type="text" id="filenameInput" value="" class="w-48 sm:w-40 px-2 py-1.5 text-sm bg-transparent text-gray-800 dark:text-gray-200 outline-none" placeholder="預設: Tommy的AI轉Word">
                    </div>

                    <button id="exportPdfBtn" class="flex items-center gap-1 bg-rose-600 hover:bg-rose-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors shadow-sm shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        PDF
                    </button>

                    <button id="exportBtn" class="flex items-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors shadow-sm shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Word
                    </button>
                </div>
            </div>
            
            <div class="flex-1 p-6 overflow-auto">
                <div id="previewArea" class="prose max-w-none">
                </div>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputText = document.getElementById('inputText');
            const previewArea = document.getElementById('previewArea');
            const exportBtn = document.getElementById('exportBtn');
            const exportPdfBtn = document.getElementById('exportPdfBtn');
            const clearBtn = document.getElementById('clearBtn');
            const filenameInput = document.getElementById('filenameInput');
            const themeToggle = document.getElementById('themeToggle');
            const htmlElement = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');

            const sunIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
            const moonIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

            function updateThemeIcon() {
                if (htmlElement.classList.contains('dark')) {
                    themeIcon.innerHTML = sunIcon;
                } else {
                    themeIcon.innerHTML = moonIcon;
                }
            }
            
            updateThemeIcon();

            themeToggle.addEventListener('click', () => {
                htmlElement.classList.toggle('dark');
                updateThemeIcon();
            });

            function updatePreview() {
                let text = inputText.value;
                if (!window.marked || !window.renderMathInElement) return;

                const mathBlocks = {};
                let mathIndex = 0;

                const replaceWithPlaceholder = (match) => {
                    const placeholder = `@@@MATH${mathIndex}@@@`;
                    
                    let safeMath = match;
                    
                    // 【重點修復】解決 AI 產生的 "無基底下標" (例如 \;_1q_2) 造成的亮紅字報錯
                    // 原理：在不該出現下標的地方，自動偷偷幫它補上一個隱形的基底 `{}`
                    safeMath = safeMath.replace(/(^|[^a-zA-Z0-9\)\}\]\\])_/g, '$1{}_');
                    
                    // 【額外修復】解決 AI 未跳脫的 % 符號 (會被當成註解導致整行消失或報錯)
                    safeMath = safeMath.replace(/(^|[^\\])%/g, '$1\\%');

                    mathBlocks[placeholder] = safeMath;
                    mathIndex++;
                    return placeholder;
                };

                text = text.replace(/\$\$([\s\S]+?)\$\$/g, replaceWithPlaceholder);
                text = text.replace(/\\\[([\s\S]+?)\\\]/g, replaceWithPlaceholder);
                text = text.replace(/\\\(([\s\S]+?)\\\)/g, replaceWithPlaceholder);
                text = text.replace(/\$([^$\n]+?)\$/g, replaceWithPlaceholder);

                let rawHtml = marked.parse(text);

                for (const [placeholder, mathText] of Object.entries(mathBlocks)) {
                    rawHtml = rawHtml.replace(placeholder, () => mathText);
                }

                previewArea.innerHTML = rawHtml;

                renderMathInElement(previewArea, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false,
                    output: 'htmlAndMathml'
                });
            }

            inputText.addEventListener('input', updatePreview);
            setTimeout(updatePreview, 500);

            clearBtn.addEventListener('click', () => {
                inputText.value = '';
                updatePreview();
            });

            exportPdfBtn.addEventListener('click', () => {
                if (inputText.value.trim() === '') {
                    alert('請先輸入內容喔！');
                    return;
                }

                const filename = filenameInput.value.trim() || 'Tommy的AI轉Word';
                const originalTitle = document.title;
                document.title = filename;

                setTimeout(() => {
                    try {
                        window.print();
                    } catch (e) {
                        alert("您的瀏覽器目前不支援此匯出功能，建議使用 Chrome 或 Safari 開啟。");
                    }
                    setTimeout(() => { document.title = originalTitle; }, 2000);
                }, 300);
            });

            exportBtn.addEventListener('click', () => {
                if (inputText.value.trim() === '') {
                    alert('請先輸入內容喔！');
                    return;
                }

                const filename = filenameInput.value.trim() || 'Tommy的AI轉Word';
                const clone = previewArea.cloneNode(true);
                const katexHtmlNodes = clone.querySelectorAll('.katex-html');
                katexHtmlNodes.forEach(node => node.remove());

                const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                      xmlns:w='urn:schemas-microsoft-com:office:word' 
                      xmlns:m='http://schemas.w3.org/1998/Math/MathML' 
                      xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>${filename}</title>
                    <style>
                        body { 
                            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; 
                            font-size: 12pt;
                            line-height: 1.5;
                        }
                        h1, h2, h3 { color: #333; font-weight: bold; }
                        p { margin-bottom: 1em; }
                        ul, ol { margin-left: 20px; }
                    </style>
                </head>
                <body>
                    ${clone.innerHTML}
                </body>
                </html>`;

                const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${filename}.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            });
        });
    </script>
</body>
</html>
